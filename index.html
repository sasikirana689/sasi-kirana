<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Diri Sasi Kirana</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
        }

        .card {
            max-width: 400px;
            background: #fff;
            margin: 60px auto;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        .card img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            border: 4px solid #ff9a9e;
        }

        h1 {
            margin: 10px 0;
            color: #333;
        }

        .info {
            text-align: left;
            margin-top: 20px;
        }

        .info p {
            margin: 8px 0;
            font-size: 14px;
        }

        .label {
            font-weight: bold;
            color: #555;
        }

        footer {
            margin-top: 20px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>

<div class="card">
    <img src="foto.jpg" alt="Foto Profil">

    <h1>Sasi Kirana</h1>

    <div class="info">
        <p><span class="label">Tempat, Tanggal Lahir:</span> Padang, 19 Januari 2009</p>
        <p><span class="label">Asal Sekolah:</span> SMKN 6 Padang</p>
        <p><span class="label">Kelas:</span> IX TJKT</p>
    </div>

    <footer>
        © 2026 Data Diri
    </footer>
</div>

</body>
